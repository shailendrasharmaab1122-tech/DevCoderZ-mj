<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; overflow: hidden; }
        #video { width: 100%; height: 100%; }
        .loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; background: #000; z-index: 100; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading...</div>
    <video id="video" playsinline controls></video>
    <script>
        const video = document.getElementById('video');
        const loading = document.getElementById('loading');

        async function initPlayer() {
            const params = new URLSearchParams(window.location.search);
            const batchId = params.get('batchId');
            const lectureId = params.get('lectureId');

            try {
                // 1. Pehle Lectures API se URL nikalte hain (Tumhare logic ke hisab se)
                // Yahan tumhara endpoint dynamic hai, isliye hum Lectures API call karenge
                const lectureRes = await fetch(`https://devcoderz-player.vercel.app/api/lectures?batchId=${batchId}&subjectId=SUBJECT_ID_YAHAN_DALO&contentType=videos&tag=TAG_ID_YAHAN_DALO&page=1`);
                const lectureData = await lectureRes.json();
                const item = lectureData.data.find(i => i._id === lectureId);
                const streamUrl = item.url; // Lectures API wala URL

                // 2. Ab Pimaxer API se sirf DRM Keys nikalte hain
                const pimaxerRes = await fetch(`https://api.pimaxer.in/v1/videos/video-url-details?parentId=${batchId}&childId=${lectureId}`);
                const pimaxerData = await pimaxerRes.json();
                const drmData = pimaxerData.data.drmDetails?.data;

                // 3. Shaka Player Load karo
                const player = new shaka.Player(video);

                if (drmData) {
                    const [kid, key] = drmData.split(':');
                    player.configure({
                        drm: {
                            clearKeys: {
                                [kid.replace(/-/g, '')]: key
                            }
                        }
                    });
                }

                await player.load(streamUrl);
                loading.style.display = 'none';
            } catch (err) {
                loading.textContent = "Error: " + err.message;
            }
        }
        initPlayer();
    </script>
</body>
</html>
