<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; overflow: hidden; }
        #video { width: 100%; height: 100%; }
        .loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; background: #000; z-index: 100; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loading" class="loading">Initializing...</div>
    <video id="video" playsinline controls></video>
    <script>
        const video = document.getElementById('video');
        const loading = document.getElementById('loading');
        
        async function initPlayer() {
            const params = new URLSearchParams(window.location.search);
            const batchId = params.get('batchId');
            const lectureId = params.get('lectureId');

            try {
                loading.textContent = "Fetching keys...";
                
                // Pimaxer API ko call kar rahe hain keys aur stream URL ke liye
                const res = await fetch(`https://api.pimaxer.in/v1/videos/video-url-details?parentId=${batchId}&childId=${lectureId}`);
                const json = await res.json();

                if (!json.success || !json.data) throw new Error("Stream data not found");

                const streamUrl = json.data.url;
                const drmData = json.data.drmDetails?.data;

                const player = new shaka.Player(video);

                if (drmData) {
                    const [kid, key] = drmData.split(':');
                    player.configure({
                        drm: {
                            clearKeys: {
                                [kid.replace(/-/g, '')]: key
                            }
                        }
                    });
                }

                await player.load(streamUrl);
                loading.style.display = 'none';
            } catch (err) {
                loading.textContent = "Player Error: " + err.message;
                console.error(err);
            }
        }
        initPlayer();
    </script>
</body>
</html>
