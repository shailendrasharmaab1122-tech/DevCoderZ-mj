<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderz Ultra Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; overflow: hidden; }
        #video { width: 100%; height: 100%; }
        .loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; background: #000; z-index: 100; }
    </style>
</head>
<body>

    <div id="loading" class="loading">Initializing Player...</div>
    <video id="video" playsinline controls></video>

    <script>
        const video = document.getElementById('video');
        const loading = document.getElementById('loading');
        
        async function initPlayer() {
            const params = new URLSearchParams(window.location.search);
            const batchId = params.get('batchId'); // ParentId
            const lectureId = params.get('lectureId'); // ChildId

            try {
                // 1. Pimaxer API se data fetch karo
                const res = await fetch(`https://api.pimaxer.in/v1/videos/video-url-details?parentId=${batchId}&childId=${lectureId}`);
                const json = await res.json();
                
                if (!json.success) throw new Error("Failed to fetch stream details");

                const streamUrl = json.data.url;
                const drmData = json.data.drmDetails.data; // format: KID:Key

                // 2. KID aur Key ko split karo
                const [kid, key] = drmData.split(':');
                
                // 3. Shaka Player Init
                const player = new shaka.Player(video);
                
                // 4. DRM Config (Clearkey)
                player.configure({
                    drm: {
                        clearKeys: {
                            [kid.replace(/-/g, '')]: key
                        }
                    }
                });

                // 5. Error handling
                player.addEventListener('error', (e) => console.error("Error code", e.detail.code));

                // 6. Load video
                await player.load(streamUrl);
                loading.style.display = 'none';
                console.log("Video loaded successfully");

            } catch (err) {
                loading.textContent = "Error: " + err.message;
                console.error(err);
            }
        }

        initPlayer();
    </script>
</body>
</html>
