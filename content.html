<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <h2 class="text-2xl font-bold mb-6">Course Content</h2>
    <div id="subject-container" class="grid grid-cols-1 gap-4"></div>
    <script>
        const courseId = new URLSearchParams(window.location.search).get('courseId');
        async function fetchFolders() {
            const res = await fetch(`https://api.thescholarverse.site/missionjeet/course/all-content/${courseId}?limit=1000`);
            const result = await res.json();
            const container = document.getElementById('subject-container');
            result.data.forEach(item => {
                container.innerHTML += `
                    <div onclick="window.location.href='chapters.html?courseId=${courseId}&id=${item.entity_id}&title=${item.title}'" 
                    class="bg-gray-800 p-4 rounded-xl flex justify-between items-center border border-gray-700 hover:bg-gray-700 transition">
                        <span class="font-medium text-lg">📁 ${item.title}</span>
                        <span class="text-gray-400">View →</span>
                    </div>`;
            });
        }
        fetchFolders();
    </script>
</body>
</html>
