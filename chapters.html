<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Jeet - Player</title>
    <style>
        body { font-family: sans-serif; margin: 0; }
        .container { display: flex; flex-direction: column; }
        #sidebar { width: 100%; border-bottom: 2px solid #ddd; }
        #videoPlayer { width: 100%; height: 250px; background: #000; }
    </style>
</head>
<body>

    <div id="videoContainer">
        <iframe id="videoPlayer" src="" allowfullscreen></iframe>
    </div>
    <div id="sidebar"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const folderId = params.get('id');
        const courseId = "185";

        async function loadContent(fId) {
            const url = `https://api.thescholarverse.site/missionjeet/course/all-content/${courseId}?limit=1000&folder_id=${fId}`;
            const res = await fetch(url);
            const result = await res.json();
            
            console.log("API Response:", result); // Yahan check karein console mein

            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = "";

            result.data.forEach(item => {
                const div = document.createElement('div');
                div.innerText = item.title;
                div.style.padding = "15px";
                div.style.borderBottom = "1px solid #eee";
                
                div.onclick = () => {
                    if (item.type === 'folder') {
                        loadContent(item.entity_id);
                    } else if (item.type === 'file') {
                        // Check karein ki data mil raha hai ya nahi
                        if (item.data && item.data.download_urls) {
                            const urls = JSON.parse(item.data.download_urls);
                            const video720p = urls.find(u => u.title === '720') || urls[0];
                            const player = document.getElementById('videoPlayer');
                            player.src = `https://devcoderz-player.vercel.app/rs45.html?Url=${encodeURIComponent(video720p.url)}`;
                        } else {
                            alert("Video link nahi mila!");
                        }
                    }
                };
                sidebar.appendChild(div);
            });
        }
        
        if(folderId) loadContent(folderId);
    </script>
</body>
</html>
