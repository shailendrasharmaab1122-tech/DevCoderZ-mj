<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Study</title>
</head>
<body>
    <div style="display:flex;">
        <div id="sidebar" style="width:300px;"></div>
        <iframe id="videoPlayer" style="width:70%; height:500px;"></iframe>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const courseId = "185";

        async function loadContent(folderId) {
            const res = await fetch(`https://api.thescholarverse.site/missionjeet/course/all-content/${courseId}?limit=1000&folder_id=${folderId}`);
            const result = await res.json();
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = "";
            result.data.forEach(item => {
                const div = document.createElement('div');
                div.innerText = item.title;
                div.style.padding = "10px";
                div.style.borderBottom = "1px solid #ccc";
                div.style.cursor = "pointer";
                div.onclick = () => {
                    if (item.type === 'folder') loadContent(item.entity_id);
                    else if (item.type === 'file' && item.data.video_type === 4) {
                        const urls = JSON.parse(item.data.download_urls);
                        const video720p = urls.find(u => u.title === '720') || urls[0];
                        document.getElementById('videoPlayer').src = `https://devcoderz-player.vercel.app/rs45.html?Url=${encodeURIComponent(video720p.url)}`;
                    }
                };
                sidebar.appendChild(div);
            });
        }
        loadContent(params.get('id'));
    </script>
</body>
</html>
